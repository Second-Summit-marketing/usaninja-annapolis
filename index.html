<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USA Ninja Challenge Annapolis | Pre-Register — Opening September 2026</title>
<meta name="description" content="Annapolis's first kids ninja gym is coming to 441 Defense Highway! Pre-register now for founding member pricing — 20% off tuition for life. First 5 families get a FREE birthday party.">
<meta property="og:title" content="USA Ninja Challenge Annapolis — Back Us Before We Open">
<meta property="og:description" content="Kickstarter-style pre-registration. Lock in founding member rates, free birthday parties, and lifetime perks before September 2026.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ninjaannapolis.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0f1923;--navy-mid:#1a2744;--navy-light:#243352;
  --orange:#e8731a;--orange-hover:#d4650f;--orange-glow:rgba(232,115,26,.25);
  --green:#22c55e;--green-dark:#16a34a;--green-bg:rgba(34,197,94,.08);
  --white:#fff;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;
  --gray-400:#94a3b8;--gray-600:#475569;--gray-800:#1e293b;--gray-900:#0f172a;
  --gold:#f59e0b;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;color:var(--gray-800);background:var(--gray-50);overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ===== TOP BAR ===== */.top-bar{background:var(--navy);color:var(--white);padding:.6rem 2rem;display:flex;justify-content:space-between;align-items:center;font-size:.8rem;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.08)}
.top-bar-logo{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;display:flex;align-items:center;gap:.5rem}
.top-bar-logo span{color:var(--orange)}
.top-bar-stats{display:flex;gap:1.5rem;align-items:center}
.top-bar-stat{display:flex;align-items:center;gap:.35rem;color:rgba(255,255,255,.7)}
.top-bar-stat strong{color:var(--green);font-weight:700}
.top-bar-cta{background:var(--orange);color:var(--white);border:none;padding:.45rem 1.2rem;border-radius:6px;font-weight:700;cursor:pointer;font-size:.8rem;text-decoration:none;transition:all .2s}
.top-bar-cta:hover{background:var(--orange-hover)}

/* ===== HERO SPLIT ===== */
.hero-split{display:grid;grid-template-columns:1fr 380px;max-width:1200px;margin:2rem auto 0;gap:2rem;padding:0 1.5rem}
@media(max-width:900px){.hero-split{grid-template-columns:1fr;margin-top:1rem}}

.hero-main{background:var(--white);border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.hero-visual{position:relative;background:linear-gradient(135deg,rgba(15,25,35,.88) 0%,rgba(26,39,68,.85) 60%,rgba(15,42,31,.88) 100%),url('images/hero-banner.jpg') center/cover no-repeat;padding:3rem 2.5rem;min-height:340px;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
.hero-visual::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(232,115,26,.12) 0%,transparent 50%),radial-gradient(ellipse at 80% 70%,rgba(34,197,94,.08) 0%,transparent 50%);pointer-events:none}
.hero-visual::after{content:'';position:absolute;bottom:0;right:0;width:280px;height:280px;background:radial-gradient(circle,rgba(232,115,26,.15) 0%,transparent 70%);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:var(--green);padding:.35rem .9rem;border-radius:100px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:1.25rem;width:fit-content}
.hero-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero-visual h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.4rem,5vw,3.5rem);color:var(--white);line-height:1.05;margin-bottom:.75rem;position:relative;z-index:1}
.hero-visual h1 .accent{color:var(--orange)}
.hero-visual p{color:rgba(255,255,255,.75);font-size:1.05rem;line-height:1.6;max-width:480px;position:relative;z-index:1}
.hero-location{display:inline-flex;align-items:center;gap:.4rem;color:rgba(255,255,255,.6);font-size:.85rem;margin-top:1rem;position:relative;z-index:1}

/* Progress Section */
.hero-progress{padding:1.5rem 2rem;border-top:1px solid var(--gray-200)}
.progress-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.6rem}.progress-count{font-size:1.8rem;font-weight:800;color:var(--gray-900)}
.progress-count span{font-size:.9rem;font-weight:500;color:var(--gray-400)}
.progress-goal{font-size:.85rem;color:var(--gray-400)}
.progress-bar-wrap{background:var(--gray-100);border-radius:100px;height:12px;overflow:hidden;margin-bottom:.75rem}
.progress-bar-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--green),#4ade80);transition:width 1.5s ease-out;min-width:2%}
.progress-milestones{display:flex;gap:1.5rem;flex-wrap:wrap}
.milestone{display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--gray-600)}
.milestone .icon{font-size:1rem}

/* Hero details row */
.hero-details{display:flex;gap:2rem;padding:1rem 2rem 1.25rem;border-top:1px solid var(--gray-200);flex-wrap:wrap}
.hero-detail{display:flex;flex-direction:column;gap:.15rem}
.hero-detail-label{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--gray-400);font-weight:600}
.hero-detail-value{font-size:.95rem;font-weight:700;color:var(--gray-800)}

/* ===== TIER SIDEBAR ===== */
.tier-sidebar{display:flex;flex-direction:column;gap:1rem}

.tier-card{background:var(--white);border-radius:14px;padding:1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.06);border:2px solid transparent;transition:all .3s;position:relative;cursor:pointer}
.tier-card:hover{border-color:var(--orange);box-shadow:0 4px 20px var(--orange-glow)}
.tier-card.featured{border-color:var(--orange);background:linear-gradient(135deg,#fff8f0 0%,var(--white) 100%)}
.tier-card.featured::before{content:'MOST POPULAR';position:absolute;top:-10px;left:1.5rem;background:var(--orange);color:var(--white);font-size:.65rem;font-weight:800;padding:.25rem .7rem;border-radius:4px;letter-spacing:1px}
.tier-card.sold-out{opacity:.65;pointer-events:none}
.tier-card.sold-out::after{content:'SOLD OUT';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-12deg);background:rgba(239,68,68,.9);color:var(--white);font-family:'Bebas Neue',sans-serif;font-size:1.8rem;padding:.2rem 1.5rem;border-radius:4px;letter-spacing:3px;z-index:2}

.tier-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.6rem}
.tier-name{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:1px;color:var(--gray-900)}
.tier-price{text-align:right}
